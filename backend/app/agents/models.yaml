# Bedrock entries pinned by Story 9.4 on 2026-04-23 against region eu-central-1
# (see docs/decisions/agentcore-bedrock-region-availability-2026-04.md).
# Anthropic + OpenAI entries added by Story 9.5a — keep llm.py factory behavior
# bit-for-bit equivalent to pre-refactor defaults (Haiku 4.5 + gpt-4o-mini).
# Story 9.5b wires the bedrock: branch into the factory; this story does NOT.
#
# Schema: logical role -> { provider: model-id }. Story 9.5a's loader picks the
# sub-key matching settings.LLM_PROVIDER (anthropic | openai | bedrock).
#
# Cross-region inference note: both Bedrock ARNs below are eu-central-1 inference
# profiles that physically route to eu-north-1. Story 9.5b's cross-region path is
# blocked on ADR-0003 (docs/adr/0003-cross-region-inference-data-residency.md)
# flipping from Proposed to Accepted.
agent_default:
  anthropic: "claude-haiku-4-5-20251001"
  openai:    "gpt-4o-mini"
  bedrock:   "arn:aws:bedrock:eu-central-1:573562677570:inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0"
agent_cheap:
  anthropic: "claude-haiku-4-5-20251001"
  openai:    "gpt-4o-mini"
  bedrock:   "arn:aws:bedrock:eu-central-1:573562677570:inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0"
# chat_default anthropic/openai peers: unreferenced until Epic 10 — revise in Story 9.5b/10.4a if needed
chat_default:
  anthropic: "claude-sonnet-4-6"
  openai:    "gpt-4o"
  bedrock:   "arn:aws:bedrock:eu-central-1:573562677570:inference-profile/eu.anthropic.claude-sonnet-4-6"
