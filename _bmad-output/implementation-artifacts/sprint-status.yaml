  # ── FUTURE CONSIDERATION: AWS AgentCore ─────────────────────────────────
  # Do NOT use AgentCore for Epic 3 agents — they are batch pipeline processors
  # (LangGraph nodes invoked synchronously from Celery), not interactive agents.
  # AgentCore solves a different problem: stateful, multi-turn, session-based agents.
  #
  # Revisit AgentCore if a future epic adds a conversational feature, e.g.:
  #   - "Chat with your finances" (user asks questions, agent queries their DB)
  #   - Proactive financial coach (agent initiates conversations on new data)
  #   - Multi-step advisor with memory across sessions
  #
  # Prerequisites before adopting AgentCore:
  #   1. Complete Bedrock migration first (see note above) — AgentCore requires Bedrock
  #   2. Agents need to be rewritten as AgentCore-compatible session handlers
  #   3. Celery orchestration is replaced by event-driven AgentCore invocations
  #
  # Cost: AgentCore adds runtime charges on top of LLM token costs.
  # Effort: High refactoring — only justified for genuinely interactive agent features.
  # ────────────────────────────────────────────────────────────────────────

