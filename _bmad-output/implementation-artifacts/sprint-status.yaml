  # ── POST-EPIC 3 ACTION: Migrate LLM clients to AWS Bedrock ──────────────
  # DECISION (2026-04-07 retrospective): DEFERRED until chat-with-finances epic.
  # Rationale: direct Anthropic/OpenAI works; capstone GDPR argument is weak;
  # AgentCore (which requires Bedrock) is the real driver — migrate when that
  # feature is being built. The llm.py abstraction makes it a contained swap.
  # (See also: AgentCore note below)
  # Original plan — when ready to migrate:
  #   - Replace langchain-anthropic (ChatAnthropic) + langchain-openai (ChatOpenAI)
  #     with langchain-aws (ChatBedrock) in backend/app/agents/llm.py (shared module)
  #   - Change points: get_llm_client() and get_fallback_llm_client() only (single file)
  #   - Choose a Bedrock-hosted fallback model (Llama 3 / Mistral) — gpt-4o-mini
  #     is NOT on Bedrock and will need a replacement
  #   - Replace OpenAI text-embedding-3-small with Amazon Titan Text Embeddings V2
  #     in backend/app/rag/embeddings.py (1536→1024 dims, re-run seed script,
  #     update pgvector column + HNSW index via new Alembic migration)
  #   - Add bedrock:InvokeModel permission to ECS Celery worker task role (IAM)
  #   - Verify claude-haiku model availability in eu-central-1; may need
  #     cross-region inference profile if the model isn't in Frankfurt yet
  #   - Rationale: financial transaction data stays inside AWS VPC (GDPR/data
  #     residency), no API key rotation, IAM ambient auth, consolidated billing
  #   - Estimated effort: 2–3 days after agent architecture is stable (includes embeddings migration)
  # ────────────────────────────────────────────────────────────────────────

  # ── FUTURE CONSIDERATION: AWS AgentCore ─────────────────────────────────
  # Do NOT use AgentCore for Epic 3 agents — they are batch pipeline processors
  # (LangGraph nodes invoked synchronously from Celery), not interactive agents.
  # AgentCore solves a different problem: stateful, multi-turn, session-based agents.
  #
  # Revisit AgentCore if a future epic adds a conversational feature, e.g.:
  #   - "Chat with your finances" (user asks questions, agent queries their DB)
  #   - Proactive financial coach (agent initiates conversations on new data)
  #   - Multi-step advisor with memory across sessions
  #
  # Prerequisites before adopting AgentCore:
  #   1. Complete Bedrock migration first (see note above) — AgentCore requires Bedrock
  #   2. Agents need to be rewritten as AgentCore-compatible session handlers
  #   3. Celery orchestration is replaced by event-driven AgentCore invocations
  #
  # Cost: AgentCore adds runtime charges on top of LLM token costs.
  # Effort: High refactoring — only justified for genuinely interactive agent features.
  # ────────────────────────────────────────────────────────────────────────

