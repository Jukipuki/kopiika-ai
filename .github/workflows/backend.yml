name: Backend CI / Build

# Single quality-gated pipeline:
#   1. lint-and-test runs on every PR + push to main
#   2. build-and-push runs ONLY on push to main, AND only after lint+tests
#      pass (`needs: lint-and-test`)
#
# Failed tests literally cannot push an image — there's nothing for
# Deploy Backend (workflow_dispatch) to release. This is the quality gate
# that the previous separate ci-backend.yml + build-image.yml workflows
# lacked (TD-119).
#
# Image tag scheme (matched by ECR lifecycle in infra/terraform/main.tf):
#   sha-<sha>          : API image        (backend/Dockerfile)
#   worker-sha-<sha>   : Celery worker    (backend/Dockerfile.worker)
#   beat-sha-<sha>     : Celery beat      (backend/Dockerfile.beat)
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: kopiika-backend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  build-and-push:
    name: Build & Push
    needs: lint-and-test
    # Only build on push to main, never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # The repo-root VERSION file lives outside backend/ (the build context)
      # and can't be COPY'd into the image. Read it on the host and pass it
      # as a build-arg → ENV → app/core/version.py picks it up.
      - name: Read app version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # `--platform linux/amd64` on every build for consistency. Mandatory
      # if a build ever runs on Apple-Silicon (laptop break-glass per
      # docs/runbooks/release.md); harmless on x86 GitHub runners.
      - name: Build & push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: |
          docker build --platform linux/amd64 \
            --build-arg APP_VERSION="$APP_VERSION" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -f backend/Dockerfile backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Build & push worker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: worker-sha-${{ github.sha }}
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: |
          docker build --platform linux/amd64 \
            --build-arg APP_VERSION="$APP_VERSION" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -f backend/Dockerfile.worker backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Build & push beat image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: beat-sha-${{ github.sha }}
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: |
          docker build --platform linux/amd64 \
            --build-arg APP_VERSION="$APP_VERSION" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -f backend/Dockerfile.beat backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Summary
        env:
          SHA: ${{ github.sha }}
        run: |
          {
            echo "## Built images"
            echo ""
            echo "| Service | Tag |"
            echo "|---|---|"
            echo "| API | \`sha-$SHA\` |"
            echo "| Worker | \`worker-sha-$SHA\` |"
            echo "| Beat | \`beat-sha-$SHA\` |"
            echo ""
            echo "Run **Deploy Backend** with image_sha = \`$SHA\` to release."
          } >> "$GITHUB_STEP_SUMMARY"
