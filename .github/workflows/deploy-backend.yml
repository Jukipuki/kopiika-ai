name: Deploy Backend

# Manual release: deploys a previously-built image (see build-image.yml) to
# App Runner + ECS. workflow_dispatch only — merging to main does NOT auto-
# deploy. The `production` environment requires reviewer approval (configured
# in GitHub repo settings → Environments).
#
# Operator flow:
#   1. Merge PR → build-image.yml builds + pushes <sha>, worker-<sha>, beat-<sha>
#   2. Open Actions → Deploy Backend → Run workflow → enter image_sha
#   3. Approve the production-environment gate
#   4. Watch the run; smoke-test the deployment
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Commit sha of the image to deploy (must be already built by build-image.yml)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: kopiika-backend

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.image_sha }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify images exist
        env:
          SHA: ${{ github.event.inputs.image_sha }}
        run: |
          for tag in "sha-$SHA" "worker-sha-$SHA" "beat-sha-$SHA"; do
            # Don't swallow stderr — an IAM denial would otherwise look
            # identical to "image not found" and waste 10 min of debugging.
            if ! out=$(aws ecr describe-images \
                --repository-name "$ECR_REPOSITORY" \
                --image-ids imageTag="$tag" \
                --region "$AWS_REGION" 2>&1); then
              echo "::error::Failed to describe $ECR_REPOSITORY:$tag"
              echo "$out"
              exit 1
            fi
          done

      # Migrations are run by the API container's entrypoint.sh on every
      # App Runner deploy — see backend/entrypoint.sh. Running them from the
      # GitHub runner is impossible because RDS is in private subnets (no
      # network path from a hosted runner) and would also need DATABASE_URL
      # injected from Secrets Manager (which the runner can't reach the DB
      # to use anyway). If a migration fails, App Runner's /health never
      # returns 200 and the deploy step below times out, surfacing the
      # failure in CI logs.

      # Direct AWS CLI for App Runner update + poll instead of the deprecated
      # awslabs/amazon-app-runner-deploy action (which also required broader
      # apprunner:StartDeployment / TagResource IAM than UpdateService).
      #
      # Polling uses the OperationId returned by update-service against
      # list-operations, NOT describe-service.Status — describe-service can
      # briefly still report the previous deploy's RUNNING state for a few
      # seconds after update-service returns, leading to a false-success race.
      #
      # ImageConfiguration MUST be included on every update-service call:
      # SourceConfiguration.ImageRepository is treated as a full replacement,
      # so omitting Port / RuntimeEnvironmentVariables would reset the
      # service to defaults (port 8080, no env vars). The values here MUST
      # mirror infra/terraform/modules/app-runner/main.tf:170-176.
      - name: Deploy API to App Runner
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.event.inputs.image_sha }}
          SERVICE_NAME: kopiika-${{ vars.ENVIRONMENT }}-api
        run: |
          SERVICE_ARN=$(aws apprunner list-services --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceArn" \
            --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "::error::App Runner service $SERVICE_NAME not found"
            exit 1
          fi

          # SourceConfiguration must be passed in full — App Runner replaces
          # the entire object on update-service. Reading current ImageConfiguration
          # back from describe-service is the safest way to keep
          # RuntimeEnvironmentSecrets in sync without duplicating secret ARNs
          # in this workflow (which would drift from Terraform).
          CURRENT_SRC=$(aws apprunner describe-service \
            --region "$AWS_REGION" --service-arn "$SERVICE_ARN" \
            --query 'Service.SourceConfiguration' --output json)

          NEW_SRC=$(echo "$CURRENT_SRC" | jq --arg img "$ECR_REGISTRY/$ECR_REPOSITORY:sha-$SHA" \
            '.ImageRepository.ImageIdentifier = $img')

          # Skip the update entirely if the desired image is already deployed
          # (idempotent retry of a previously-succeeded App Runner step).
          # update-service is a no-op in that case and returns no OperationId.
          CURRENT_IMG=$(echo "$CURRENT_SRC" | jq -r '.ImageRepository.ImageIdentifier')
          DESIRED_IMG="$ECR_REGISTRY/$ECR_REPOSITORY:sha-$SHA"
          if [ "$CURRENT_IMG" = "$DESIRED_IMG" ]; then
            echo "App Runner already on $DESIRED_IMG — skipping update."
            exit 0
          fi

          OP_ID=$(aws apprunner update-service \
            --region "$AWS_REGION" \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "$NEW_SRC" \
            --query 'OperationId' --output text)

          if [ -z "$OP_ID" ] || [ "$OP_ID" = "None" ]; then
            echo "::error::update-service did not return an OperationId"
            exit 1
          fi
          echo "Tracking App Runner operation $OP_ID"

          # Poll list-operations for THIS specific operation until terminal.
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner list-operations \
              --region "$AWS_REGION" \
              --service-arn "$SERVICE_ARN" \
              --query "OperationSummaryList[?Id=='$OP_ID'].Status" \
              --output text)
            echo "Operation status: ${STATUS:-pending}"
            case "$STATUS" in
              SUCCEEDED) echo "Deploy succeeded."; exit 0 ;;
              FAILED|ROLLBACK_FAILED)
                echo "::error::App Runner operation $OP_ID terminal state: $STATUS"
                exit 1 ;;
              ROLLBACK_SUCCEEDED)
                echo "::error::App Runner deploy rolled back; new image rejected"
                exit 1 ;;
              PENDING|IN_PROGRESS|ROLLBACK_IN_PROGRESS|"") sleep 5 ;;
              *) echo "Unknown status '$STATUS', continuing"; sleep 5 ;;
            esac
            if [ "$i" = "60" ]; then
              echo "::error::App Runner deploy timed out after 5 minutes"
              exit 1
            fi
          done

      - name: Render worker task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: kopiika-${{ vars.ENVIRONMENT }}-worker
          container-name: worker
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:worker-sha-${{ github.event.inputs.image_sha }}

      - name: Deploy worker to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: kopiika-${{ vars.ENVIRONMENT }}-worker
          cluster: kopiika-${{ vars.ENVIRONMENT }}-cluster
          wait-for-service-stability: true

      - name: Render beat task definition
        id: render-beat
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: kopiika-${{ vars.ENVIRONMENT }}-beat
          container-name: beat
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:beat-sha-${{ github.event.inputs.image_sha }}

      - name: Deploy beat to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-beat.outputs.task-definition }}
          service: kopiika-${{ vars.ENVIRONMENT }}-beat
          cluster: kopiika-${{ vars.ENVIRONMENT }}-cluster
          wait-for-service-stability: true
